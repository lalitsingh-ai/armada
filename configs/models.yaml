# Model registry used by scripts/download_model.sh and the report.
# Small, tool-calling-capable instruct models. Q4_0 GGUF is preferred on Arm because
# llama.cpp repacks Q4_0 weights at load time onto the i8mm / dotprod matmul paths.

models:
  qwen2.5-3b-instruct-q4_0:
    hf_repo: Qwen/Qwen2.5-3B-Instruct-GGUF
    gguf_file: qwen2.5-3b-instruct-q4_0.gguf
    context: 32768
    notes: "Strong tool-calling for its size; default choice."

  llama-3.2-3b-instruct-q4_0:
    hf_repo: bartowski/Llama-3.2-3B-Instruct-GGUF
    gguf_file: Llama-3.2-3B-Instruct-Q4_0.gguf
    context: 131072
    notes: "Alternative small model; verify chat template supports tools."

  qwen2.5-7b-instruct-q4_0:
    hf_repo: Qwen/Qwen2.5-7B-Instruct-GGUF
    gguf_file: qwen2.5-7b-instruct-q4_0.gguf
    context: 32768
    notes: "Higher quality; needs more RAM/cores. Good for a larger Arm instance."
